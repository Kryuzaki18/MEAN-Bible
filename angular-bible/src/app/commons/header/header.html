<div
  class="bg-[var(--p-primary-50)] dark:bg-[var(--p-primary-900)] border-b border-[var(--p-primary-100)] dark:border-[var(--p-primary-700)]"
>
  <header class="header-container flex items-center max-w-[1440px] mx-auto px-2">
    <div class="flex items-center justify-between w-full">
      <p-button
        icon="pi pi-bars"
        (click)="appSettingsService.toggleSidebar()"
        class="lg:hidden"
        [text]="true"
        severity="secondary"
      />

      <button
        class="cursor-pointer flex items-center gap-2 px-4 py-2 rounded bg-[var(--p-primary-100)] dark:bg-[var(--p-primary-700)] border border-[var(--p-primary-300)] dark:border-[var(--p-primary-600)] disabled:cursor-not-allowed"
        (click)="show()"
        [disabled]="bookmarks().length === 0"
      >
        <span
          class="pi text-[var(--p-primary-500)] dark:text-[var(--p-primary-100)]"
          [ngClass]="{
            'pi-bookmark-fill': bookmarks().length > 0,
            'pi-bookmark': bookmarks().length === 0,
          }"
        ></span>
        <span class="text-[var(--p-primary-500)] dark:text-[var(--p-primary-100)] font-semibold"
          >Bookmarks</span
        >
        @if (bookmarks().length > 0) {
          <span
            class="bg-[var(--p-primary-500)] text-[var(--p-primary-50)] dark:bg-[var(--p-primary-200)] dark:text-[var(--p-primary-800)] rounded py-0.5 px-1.5 text-xs font-semibold"
          >
            {{ bookmarks().length }}
          </span>
        }
      </button>

      <button class="cursor-pointer p-2" (click)="appSettingsService.toggleDarkMode()">
        <span
          class="pi text-lg text-[var(--p-primary-800)] dark:text-[var(--p-primary-100)]"
          [class.pi-moon]="appSettingsService.isDarkMode()"
          [class.pi-sun]="!appSettingsService.isDarkMode()"
        ></span>
      </button>
    </div>
  </header>
</div>
