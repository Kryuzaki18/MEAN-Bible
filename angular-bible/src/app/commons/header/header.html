<div
  class="bg-[var(--color-parchment-100)] dark:bg-[var(--color-ink-800)] border-b border-[var(--color-parchment-300)] dark:border-[var(--color-parchment-300)]"
>
  <header
    class="header-container flex items-center justify-between-safe px-4 max-w-[1440px] mx-auto h-full"
  >
    <div class="flex items-center gap-4">
      <p-button
        icon="pi pi-bars"
        (click)="onToggleSidebar.emit()"
        class="lg:hidden"
        [text]="true"
        severity="secondary"
      />
      <div class="flex items-center gap-2">
        <button
          class="cursor-pointer flex items-center gap-2 dark:bg-stone-300 dark:text-stone-800 bg-stone-800 text-stone-300 px-4 py-2 rounded"
          (click)="show()"
        >
          <span class="pi pi-bookmark"></span>
          <span>Bookmarks</span>
          @if (bookmarks().length > 0) {
            <span class="bg-[var(--color-ink-900)] text-white rounded py-0.5 px-1.5 text-[10px]">
              {{ bookmarks().length }}
            </span>
          }
        </button>
      </div>
    </div>
  </header>
</div>
