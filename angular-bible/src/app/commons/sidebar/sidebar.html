<aside class="flex flex-col p-3">
  @for (book of allBooks(); track $index) {
    <div
      class="flex items-center gap-3 py-1.5 w-full cursor-pointer hover:bg-green-950 font-light"
      [ngClass]="{
        'bg-green-950 text-green-300 font-medium': book.name === selectedBook().name,
      }"
      (click)="navigateToBook(book.name)"
    >
      <span class="pi pi-book"></span>
      <span class="book-name">{{ book.name }}</span>
    </div>
  }
</aside>
