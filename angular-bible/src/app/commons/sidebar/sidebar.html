<aside class="sidebar-container flex flex-col">
  <div class="sidebar-tabs flex items-center gap-2 py-1.5 px-3">
    <button
      type="button"
      class="w-full px-2 py-1 border border-stone-600 hover:border-stone-700 hover:bg-stone-700 hover:text-stone-100 rounded cursor-pointer text-xs"
      [ngClass]="{
        'bg-stone-600': testament() === 0,
        'bg-stone-800 text-stone-400': testament() === 1,
      }"
      (click)="updateTestament(0)"
    >
      Old
    </button>

    <button
      type="button"
      class="w-full px-2 py-1 border border-stone-600 hover:border-stone-700 hover:bg-stone-700 hover:text-stone-100 rounded cursor-pointer text-xs"
      [ngClass]="{
        'bg-stone-600': testament() === 1,
        'bg-stone-800  text-stone-400': testament() === 0,
      }"
      (click)="updateTestament(1)"
    >
      New
    </button>
  </div>

  <p-scrollpanel class="sidebar-books">
    @for (book of filteredBooks(); track $index) {
      <div
        class="flex items-center gap-3 py-1.5 px-2 w-full cursor-pointer hover:bg-stone-500 font-light"
        [ngClass]="{
          'bg-[var(--color-gold-500)] text-[var(--color-parchment-50)]':
            book.name === selectedBook().name,
        }"
        (click)="navigateToBook(book.name)"
      >
        <span class="pi pi-book"></span>
        <span class="book-name">{{ book.name }}</span>
      </div>
    }
  </p-scrollpanel>
</aside>
