<aside class="sidebar-container">
  <div
    class="sidebar-tabs flex items-center gap-2 px-2 text-[var(--p-primary-50)] dark:text-[var(--p-primary-100)] font-semibold"
  >
    <p-selectbutton
      [allowEmpty]="false"
      [options]="testaments()"
      optionLabel="label"
      optionValue="value"
      dataKey="value"
      size="small"
      class="text-xs"
      fluid
      [(ngModel)]="testament"
      (onChange)="updateTestament($event.value)"
    />
  </div>

  <p-scrollpanel class="sidebar-books pb-3">
    @for (book of filteredBooks(); track $index) {
      <button
        #bookButtons
        type="button"
        class="flex items-center justify-between p-2 my-0.5 w-full cursor-pointer font-light hover:bg-[var(--p-primary-100)] dark:hover:bg-[var(--p-primary-400)] hover:text-[var(--p-primary-600)] dark:hover:text-[var(--p-primary-50)]"
        [ngClass]="{
          'bg-[var(--p-primary-100)] dark:bg-[var(--p-primary-500)] text-[var(--p-primary-600)] dark:text-[var(--p-primary-50)] font-semibold':
            book.name === selectedBook()?.name,
        }"
        (click)="navigateToBook(book.name)"
      >
        <div class="flex gap-2 items-center">
          <span class="pi pi-book"></span>
          <span class="text-md">{{ book.name }}</span>
        </div>

        <div class="flex flex-col items-end gap-0.5">
          <span class="text-[11px]">{{ book.abbreviation }}</span>
          <span class="text-[10px]"
            >{{ book.chapters }} Chapter{{ book.chapters > 1 ? 's' : '' }}</span
          >
        </div>
      </button>
    }
  </p-scrollpanel>
</aside>
